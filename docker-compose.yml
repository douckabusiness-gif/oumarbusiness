services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      APP_URL: http://localhost:1010
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:1010
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-nextauth-secret}
    ports:
      - "127.0.0.1:1010:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: http://localhost:1010
      CORS_ORIGINS: http://localhost:1010,http://127.0.0.1:1010
      DATABASE_URL: postgresql://${POSTGRES_USER:-oumar}:${POSTGRES_PASSWORD:-local_oumar_password}@postgres:5432/${POSTGRES_DB:-oumar_agency}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: oumar-agency-files
      S3_REGION: eu-west-3
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-local_minio_password}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-dev-encryption-key}
      ANTHROPIC_API_KEY: ""
      FAL_KEY: ""
      TAVILY_API_KEY: ""
      SERPER_API_KEY: ""
      META_ACCESS_TOKEN: ""
      META_PHONE_NUMBER_ID: ""
      META_WEBHOOK_VERIFY_TOKEN: docker-local-verify-token
      BAILEYS_SESSIONS_DIR: /data/baileys-sessions
      UPLOADS_DIR: /data/uploads
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - baileys-sessions:/data/baileys-sessions
      - branding-assets:/data/uploads

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oumar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_oumar_password}
      POSTGRES_DB: ${POSTGRES_DB:-oumar_agency}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local_minio_password}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
  baileys-sessions:
  branding-assets:
